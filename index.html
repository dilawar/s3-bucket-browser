<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>S3 Explorer</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background: #ffffff;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100vh;
    }
    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: sans-serif;
      font-size: 1.2rem;
      color: #555;
      background: #fff;
    }
  </style>
</head>
<body>
  <div id="loading">Loading S3 Explorer…</div>
  <canvas id="s3_explorer_canvas"></canvas>
  <script type="module">
    import init from './pkg/s3_explorer.js';
    await init();
    document.getElementById('loading').remove();
  </script>
</body>
</html>
