name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build — ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x86_64
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact: s3-explorer
            archive: s3-explorer-linux-x86_64.tar.gz

          - name: Windows x86_64
            os: windows-2022
            target: x86_64-pc-windows-msvc
            artifact: s3-explorer.exe
            archive: s3-explorer-windows-x86_64.zip

          - name: macOS x86_64
            os: macos-13
            target: x86_64-apple-darwin
            artifact: s3-explorer
            archive: s3-explorer-macos-x86_64.tar.gz

          - name: macOS ARM64
            os: macos-14
            target: aarch64-apple-darwin
            artifact: s3-explorer
            archive: s3-explorer-macos-aarch64.tar.gz

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # Linux: install GUI / OpenGL dependencies
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libwayland-dev \
            libgtk-3-dev \
            libglib2.0-dev \
            libatk1.0-dev \
            libpango1.0-dev \
            libgdk-pixbuf2.0-dev \
            libegl1-mesa-dev \
            libgl1-mesa-dev \
            libssl-dev \
            pkg-config

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      # ── Package ──────────────────────────────────────────────────────────────

      - name: Package (Linux / macOS)
        if: runner.os != 'Windows'
        run: |
          BIN=target/${{ matrix.target }}/release/${{ matrix.artifact }}
          tar -czf ${{ matrix.archive }} -C "$(dirname $BIN)" "$(basename $BIN)"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $bin = "target\${{ matrix.target }}\release\${{ matrix.artifact }}"
          Compress-Archive -Path $bin -DestinationPath ${{ matrix.archive }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}
          if-no-files-found: error

  # Build Debian and RPM packages
  package-linux:
    name: Package — Linux x86_64 (deb/rpm)
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: x86_64-unknown-linux-gnu-packages

      - name: Install Linux dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libwayland-dev \
            libgtk-3-dev \
            libglib2.0-dev \
            libatk1.0-dev \
            libpango1.0-dev \
            libgdk-pixbuf2.0-dev \
            libegl1-mesa-dev \
            libgl1-mesa-dev \
            libssl-dev \
            pkg-config \
            rpm

      - name: Install packaging tools
        run: |
          cargo install cargo-deb
          cargo install cargo-generate-rpm

      - name: Build release binary
        run: cargo build --release --target x86_64-unknown-linux-gnu

      - name: Build Debian package
        run: cargo deb --target x86_64-unknown-linux-gnu

      - name: Build RPM package
        run: cargo generate-rpm

      - name: Upload Debian package
        uses: actions/upload-artifact@v4
        with:
          name: s3-explorer-debian
          path: target/debian/*.deb
          if-no-files-found: error

      - name: Upload RPM package
        uses: actions/upload-artifact@v4
        with:
          name: s3-explorer-rpm
          path: target/generate-rpm/*.rpm
          if-no-files-found: error

  release:
    name: Create Release
    needs: [build, package-linux]
    runs-on: ubuntu-latest
    # Only publish a GitHub Release when triggered by a version tag.
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
