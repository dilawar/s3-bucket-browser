<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Sky gradient background -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a6fd4"/>
      <stop offset="100%" stop-color="#0d4fa0"/>
    </linearGradient>
    <!-- Bucket body gradient -->
    <linearGradient id="bucketGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#ddeeff" stop-opacity="0.90"/>
    </linearGradient>
    <!-- Bucket rim highlight -->
    <linearGradient id="rimGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#aaccee"/>
    </linearGradient>
    <!-- Cloud gradient -->
    <linearGradient id="cloudGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e8f4ff"/>
    </linearGradient>
    <!-- Arrow accent -->
    <linearGradient id="arrowGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2196f3"/>
      <stop offset="100%" stop-color="#0d47a1"/>
    </linearGradient>
    <!-- Drop shadow filter -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#00000033"/>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#00000022"/>
    </filter>
    <clipPath id="circleClip">
      <circle cx="256" cy="256" r="240"/>
    </clipPath>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="110" ry="110" fill="url(#bg)"/>

  <!-- Cloud shape (top, behind bucket) -->
  <g filter="url(#softShadow)" clip-path="url(#circleClip)">
    <ellipse cx="256" cy="158" rx="90" ry="52" fill="url(#cloudGrad)" opacity="0.92"/>
    <ellipse cx="196" cy="175" rx="62" ry="42" fill="url(#cloudGrad)" opacity="0.92"/>
    <ellipse cx="316" cy="172" rx="65" ry="40" fill="url(#cloudGrad)" opacity="0.92"/>
    <rect x="160" y="175" width="192" height="38" fill="url(#cloudGrad)" opacity="0.92" rx="4"/>
  </g>

  <!-- Bucket body (trapezoid via polygon) -->
  <g filter="url(#shadow)">
    <!-- Main body -->
    <path d="M166,228 L178,370 Q180,390 200,392 L312,392 Q332,390 334,370 L346,228 Z"
          fill="url(#bucketGrad)" stroke="#90b8e0" stroke-width="3"/>
    <!-- Rim (top ellipse) -->
    <ellipse cx="256" cy="228" rx="90" ry="18"
             fill="url(#rimGrad)" stroke="#90b8e0" stroke-width="3"/>
    <!-- Rim inner shadow line -->
    <ellipse cx="256" cy="228" rx="78" ry="13" fill="none" stroke="#c8dff2" stroke-width="2" opacity="0.7"/>
  </g>

  <!-- Down-arrow inside bucket (represents download/explore) -->
  <g filter="url(#softShadow)">
    <rect x="240" y="268" width="32" height="64" rx="8" fill="url(#arrowGrad)"/>
    <polygon points="218,318 256,362 294,318" fill="url(#arrowGrad)"/>
  </g>

  <!-- Subtle shine on bucket left face -->
  <path d="M183,238 L190,340 Q191,352 198,357 L210,358 L200,240 Z"
        fill="white" opacity="0.18" rx="4"/>
</svg>
